pre-commit:
  parallel: true
  commands:
    typecheck:
      glob: "src/**/*.{ts,tsx}"
      run: pnpm typecheck
    lint:
      glob: "src/**/*.{ts,tsx}"
      run: pnpm lint
    format-check:
      # Lefthook's `**/` matcher requires at least one path segment, so root-
      # level files need their own pattern alongside the nested one.
      glob:
        - "*.{ts,tsx,js,mjs,cjs,css,html,json,md,yml,yaml}"
        - "**/*.{ts,tsx,js,mjs,cjs,css,html,json,md,yml,yaml}"
      run: pnpm format:check
    rust-check:
      glob: "src-tauri/src/**/*.rs"
      run: cd src-tauri && cargo clippy --all-targets -- -D warnings
    rust-fmt:
      glob: "src-tauri/src/**/*.rs"
      run: cd src-tauri && cargo fmt --check
