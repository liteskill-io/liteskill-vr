name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            bundles: deb,rpm
          - target: x86_64-apple-darwin
            os: macos-latest
            bundles: app
          - target: aarch64-apple-darwin
            os: macos-latest
            bundles: app
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bundles: msi,nsis

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev

      - run: pnpm install --frozen-lockfile

      # Build only — the manifest job handles the release upload. Do NOT pass
      # tagName/releaseName here; tauri-action would otherwise create its own
      # draft and upload with its naming, producing duplicates alongside the
      # manifest job's upload.
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # Build a standalone headless MCP binary for this exact target. Separate
      # from the beforeBuildCommand build (which is native-arch and gets baked
      # into the Linux deb/rpm) — this one is distributed as its own asset.
      - name: Build standalone headless binary
        shell: bash
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            --bin liteskillvr-mcp \
            --no-default-features \
            --manifest-path src-tauri/Cargo.toml

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          TARGET="${{ matrix.target }}"
          BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle"
          HEADLESS_DIR="src-tauri/target/${TARGET}/release"

          # .deb/.rpm/.msi/.exe/.dmg already encode arch in their Tauri-default
          # filenames, so we keep those names as-is.
          find "${BUNDLE_DIR}" -type f \( \
            -name "*.deb" -o -name "*.rpm" -o \
            -name "*.msi" -o -name "*.exe" -o \
            -name "*.dmg" \
          \) -exec cp {} release-artifacts/ \; 2>/dev/null || true

          # macOS .app is a directory and Tauri names it "<product>.app" with
          # no arch suffix, so we tarball it with the target triple to
          # disambiguate x86_64 vs aarch64 builds.
          if [[ -d "${BUNDLE_DIR}/macos" ]]; then
            for app in "${BUNDLE_DIR}"/macos/*.app; do
              [ -d "$app" ] || continue
              tar -czf "release-artifacts/$(basename "$app" .app)-${TARGET}.app.tar.gz" \
                -C "$(dirname "$app")" "$(basename "$app")"
            done
          fi

          # Standalone headless MCP binary. Asset name spells out "-headless-"
          # so it's obvious from the release page that this is the GUI-less
          # variant, not an installer.
          if [[ -f "${HEADLESS_DIR}/liteskillvr-mcp.exe" ]]; then
            cp "${HEADLESS_DIR}/liteskillvr-mcp.exe" \
              "release-artifacts/liteskillvr-mcp-headless-${TARGET}.exe"
          elif [[ -f "${HEADLESS_DIR}/liteskillvr-mcp" ]]; then
            cp "${HEADLESS_DIR}/liteskillvr-mcp" \
              "release-artifacts/liteskillvr-mcp-headless-${TARGET}"
          fi

          echo "=== Artifacts ==="
          ls -la release-artifacts/ || echo "No artifacts"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release-artifacts/*
          if-no-files-found: warn

  manifest:
    name: Create release manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Generate SHA256 manifest
        run: |
          cd all-artifacts
          sha256sum * 2>/dev/null | tee SHA256SUMS.txt
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS.txt

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: "LiteSkill VR ${{ github.ref_name }}"
          files: all-artifacts/*
