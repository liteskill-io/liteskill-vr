name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LiteSkill VR ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          TAG="${{ github.ref_name }}"
          TARGET="${{ matrix.target }}"

          if [[ "${{ runner.os }}" == "Linux" ]]; then
            find src-tauri/target/${TARGET}/release/bundle -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -exec cp {} release-artifacts/ \; 2>/dev/null || true
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            find src-tauri/target/${TARGET}/release/bundle -type f \( -name "*.dmg" -o -name "*.app.tar.gz" \) -exec cp {} release-artifacts/ \; 2>/dev/null || true
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            find src-tauri/target/${TARGET}/release/bundle -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.nsis" \) -exec cp {} release-artifacts/ \; 2>/dev/null || true
          fi

          # Rename artifacts to include target triple
          for f in release-artifacts/*; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            ext="${base##*.}"
            name="${base%.*}"
            mv "$f" "release-artifacts/${name}-${TARGET}.${ext}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release-artifacts/*
          if-no-files-found: warn

  manifest:
    name: Create release manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Generate SHA256 manifest
        shell: bash
        run: |
          cd all-artifacts
          sha256sum * > SHA256SUMS.txt 2>/dev/null || echo "No artifacts found" > SHA256SUMS.txt
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS.txt

      - name: Upload manifest to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            all-artifacts/*
            all-artifacts/SHA256SUMS.txt
