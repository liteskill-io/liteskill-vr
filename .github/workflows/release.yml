name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            bundles: deb,rpm
          - target: x86_64-apple-darwin
            os: macos-latest
            bundles: app
          - target: aarch64-apple-darwin
            os: macos-latest
            bundles: app
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bundles: msi,nsis

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LiteSkill VR ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          TARGET="${{ matrix.target }}"
          BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle"

          find "${BUNDLE_DIR}" -type f \( \
            -name "*.deb" -o -name "*.rpm" -o \
            -name "*.msi" -o -name "*.exe" -o \
            -name "*.dmg" -o -name "*.app.tar.gz" \
          \) -exec cp {} release-artifacts/ \; 2>/dev/null || true

          # For macOS .app, create a tar.gz
          if [[ -d "${BUNDLE_DIR}/macos" ]]; then
            for app in "${BUNDLE_DIR}"/macos/*.app; do
              [ -d "$app" ] || continue
              tar -czf "release-artifacts/$(basename "$app" .app)-${TARGET}.app.tar.gz" -C "$(dirname "$app")" "$(basename "$app")"
            done
          fi

          # Rename artifacts to include target triple
          for f in release-artifacts/*; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            # Skip if already has target in name
            if [[ "$base" == *"${TARGET}"* ]]; then continue; fi
            ext="${base#*.}"
            name="${base%%.*}"
            mv "$f" "release-artifacts/${name}-${TARGET}.${ext}"
          done

          echo "=== Artifacts ==="
          ls -la release-artifacts/ || echo "No artifacts"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release-artifacts/*
          if-no-files-found: warn

  manifest:
    name: Create release manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Generate SHA256 manifest
        run: |
          cd all-artifacts
          sha256sum * 2>/dev/null | tee SHA256SUMS.txt
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS.txt

      - name: Upload manifest and artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: all-artifacts/*
