[target.'cfg(all())']
rustflags = [
  # Deny all warnings in CI / development
  "-Dwarnings",

  # Additional clippy lint groups enabled at workspace level
  "-Wclippy::pedantic",
  "-Wclippy::nursery",

  # Allow some pedantic lints that are too noisy
  "-Aclippy::module_name_repetitions",
  "-Aclippy::must_use_candidate",
  "-Aclippy::missing_errors_doc",
  "-Aclippy::missing_panics_doc",
]
